version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: msw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: msw
      POSTGRES_PASSWORD: msw_password
      POSTGRES_DB: msw_backend
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U msw -d msw_backend"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-cache:
    image: redis:7-alpine
    container_name: msw-redis-cache
    restart: unless-stopped
    command: redis-server --maxmemory 32mb --maxmemory-policy volatile-ttl
    volumes:
      - redis_cache_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-ephemeral:
    image: redis:7-alpine
    container_name: msw-redis-ephemeral
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_ephemeral_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-stream:
    image: redis:7-alpine
    container_name: msw-redis-stream
    restart: unless-stopped
    command: redis-server --maxmemory 32mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_stream_data:/data
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-audit:
    image: redis:7-alpine
    container_name: msw-redis-audit
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_audit_data:/data
    ports:
      - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: msw-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: msw_access_key
      MINIO_ROOT_PASSWORD: msw_secret_key
    volumes:
      - minio_data:/data
      - ./local-storage:/local-storage:ro
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: msw-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 msw_access_key msw_secret_key;
      mc mb local/staging --ignore-existing;
      mc mb local/production --ignore-existing;
      mc mb local/backups --ignore-existing;
      echo 'Buckets created successfully';
      exit 0;
      "

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: msw-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-ephemeral:
        condition: service_healthy
      redis-stream:
        condition: service_healthy
      redis-audit:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://msw:msw_password@postgres:5432/msw_backend
      - CACHE_REDIS_URL=redis://redis-cache:6379
      - EPHEMERAL_REDIS_URL=redis://redis-ephemeral:6379
      - STREAM_REDIS_URL=redis://redis-stream:6379
      - AUDIT_REDIS_URL=redis://redis-audit:6379
      - BACKBLAZE_KEY_ID=msw_access_key
      - BACKBLAZE_KEY=msw_secret_key
      - BACKBLAZE_STAGING_BUCKET=staging
      - BACKBLAZE_PRODUCTION_BUCKET=production
      - BACKBLAZE_BACKUP_BUCKET=backups
      - FILE_SYNC_ENABLED=true
    ports:
      - "3000:3000"
    volumes:
      - ./prisma:/app/prisma

volumes:
  postgres_data:
  redis_cache_data:
  redis_ephemeral_data:
  redis_stream_data:
  redis_audit_data:
  minio_data: