version: '3.8'

x-redis-common: &redis-common
  image: redis:7-alpine
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "redis-cli", "ping"]
    interval: 10s
    timeout: 5s
    retries: 5

services:
  postgres:
    image: postgres:16-alpine
    container_name: msw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: msw
      POSTGRES_PASSWORD: msw_password
      POSTGRES_DB: msw_backend
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U msw -d msw_backend"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-cache:
    <<: *redis-common
    container_name: msw-redis-cache
    command: redis-server --maxmemory 64mb --maxmemory-policy volatile-ttl
    volumes:
      - redis_cache_data:/data
    ports:
      - "6379:6379"

  redis-ephemeral:
    <<: *redis-common
    container_name: msw-redis-ephemeral
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_ephemeral_data:/data
    ports:
      - "6380:6379"

  redis-stream:
    <<: *redis-common
    container_name: msw-redis-stream
    command: redis-server --maxmemory 32mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_stream_data:/data
    ports:
      - "6381:6379"

  redis-audit:
    <<: *redis-common
    container_name: msw-redis-audit
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_audit_data:/data
    ports:
      - "6382:6379"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: msw-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-ephemeral:
        condition: service_healthy
      redis-stream:
        condition: service_healthy
      redis-audit:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://msw:msw_password@postgres:5432/msw_backend
      - CACHE_REDIS_URL=redis://redis-cache:6379
      - EPHEMERAL_REDIS_URL=redis://redis-ephemeral:6379
      - STREAM_REDIS_URL=redis://redis-stream:6379
      - AUDIT_REDIS_URL=redis://redis-audit:6379
      - FILE_SYNC_ENABLED=true
      - CONFIG_SYNC_ENABLED=true
      - CONFIG_SYNC_DIR=/data/config
    ports:
      - "3000:3000"
    volumes:
      - ./prisma:/app/prisma
      - ../MSW-Tools/data:/data:ro
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres_data:
  redis_cache_data:
  redis_ephemeral_data:
  redis_stream_data:
  redis_audit_data: